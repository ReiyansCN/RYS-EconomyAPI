name: "${project.artifactId}"
version: "${project.version}"
author: onebone
api: ["1.0.13"]
main: "${project.groupId}"

softdepend:
  - "EasySQLX"

permissions:
  economyapi:
    children:
      economyapi.command:
        children:
          economyapi.command.mymoney:
            default: true
          economyapi.command.topmoney:
            default: true
          economyapi.command.seemoney:
            default: true
          economyapi.command.givemoney:
            default: op
          economyapi.command.takemoney:
            default: op
          economyapi.command.pay:
            default: true
          economyapi.command.setmoney:
            default: op